services:
  warp_proxy:
    build:
      context: ./deploy/wireproxy
    image: wireproxy:local
    container_name: warp_proxy
    volumes:
      - ./warp_private/wireproxy/config:/etc/wireproxy/config:ro
      - ./warp_private/wgcf/wgcf-profile.conf:/etc/wireproxy/wgcf-profile.conf:ro
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "3"

  telegram-stremio:
    build: .
    image: telegram-stremio:local
    container_name: tg_stremio  
    depends_on:
      - warp_proxy
      - qbittorrent
    ports:
      - "8000:8000"
    volumes:
      - ./config.env:/app/config.env
      - ./cache:/app/cache
      - /mnt/stremio-downloads/torrents/completed:/downloads/completed:ro
      - /var/log/nginx:/host/var/log/nginx:ro
      - /sys/class/net/ens3/statistics/tx_bytes:/host/ens3_tx_bytes:ro
      - /proc/net:/host/proc/net:ro
    restart: unless-stopped
    mem_limit: 768m
    memswap_limit: 1536m
    logging:
      driver: "json-file"
      options:
        max-size: "1m"     
        max-file: "3"

  qbittorrent:
    image: qbittorrentofficial/qbittorrent-nox:latest
    container_name: qbittorrent
    environment:
      - QBT_LEGAL_NOTICE=confirm
      - QBT_TORRENTING_PORT=6881
      - QBT_WEBUI_PORT=8080
      - PUID=1001
      - PGID=1001
      - UMASK=002
      - TZ=Asia/Kolkata
    ports:
      - "6881:6881/tcp"
      - "6881:6881/udp"
    volumes:
      - /mnt/stremio-downloads/torrents/qbit-config:/config
      - /mnt/stremio-downloads/torrents:/downloads
    restart: unless-stopped
    stop_grace_period: 30m
    tmpfs:
      - /tmp
    mem_limit: 384m
    memswap_limit: 768m
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "3"
