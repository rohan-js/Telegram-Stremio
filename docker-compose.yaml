services:
  telegram-stremio:
    build: .
    container_name: tg_stremio  
    ports:
      - "8000:8000"
    volumes:
      - ./config.env:/app/config.env
      - ./cache:/app/cache
    restart: unless-stopped
    mem_limit: 768m
    memswap_limit: 1536m
    logging:
      driver: "json-file"
      options:
        max-size: "1m"     
        max-file: "3"
