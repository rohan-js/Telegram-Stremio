<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Opening Nuvio</title>
    <style>
        * { box-sizing: border-box; }
        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            padding: 24px;
            background: #08111f;
            color: #f5f7fb;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        main {
            width: min(100%, 440px);
            padding: 32px;
            border: 1px solid #26364e;
            border-radius: 8px;
            background: #101c2d;
            box-shadow: 0 20px 50px rgba(0, 0, 0, .28);
            text-align: center;
        }
        .mark {
            width: 52px;
            height: 52px;
            margin: 0 auto 18px;
            display: grid;
            place-items: center;
            border-radius: 50%;
            background: #15b8d4;
            color: #06101b;
            font-size: 22px;
            font-weight: 900;
        }
        h1 { margin: 0; font-size: 26px; letter-spacing: 0; }
        p { margin: 12px 0 0; color: #a8b5c8; line-height: 1.55; }
        .episode { color: #7dd3fc; font-weight: 700; }
        .actions { display: none; margin-top: 26px; gap: 10px; }
        .actions.visible { display: grid; }
        button, a {
            width: 100%;
            min-height: 46px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 16px;
            border: 1px solid transparent;
            border-radius: 6px;
            font: inherit;
            font-weight: 750;
            text-decoration: none;
            cursor: pointer;
        }
        .primary { background: #15b8d4; color: #06101b; }
        .secondary { background: #1b2a40; border-color: #31435e; color: #f5f7fb; }
        .manifest {
            margin-top: 16px;
            padding: 12px;
            border: 1px solid #26364e;
            border-radius: 6px;
            color: #93a4ba;
            font: 11px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
            overflow-wrap: anywhere;
        }
    </style>
</head>
<body>
    <main>
        <div class="mark">N</div>
        <h1>Opening Nuvio</h1>
        <p id="status">Launching the title in Nuvio...</p>
        {% if episode_label %}<p class="episode">Select {{ episode_label }} on the series page.</p>{% endif %}

        <div id="actions" class="actions">
            <button type="button" class="primary" onclick="openNuvio()">Open Nuvio</button>
            {% if install_link %}
            <a class="secondary" href="{{ install_link }}">Install Addon in Nuvio</a>
            {% endif %}
            {% if manifest_url %}
            <button type="button" class="secondary" onclick="copyManifest()">Copy Manifest URL</button>
            <div id="manifest" class="manifest">{{ manifest_url }}</div>
            {% endif %}
            <a id="windows-update" class="secondary" href="{{ desktop_releases_url }}" hidden>Update Nuvio Desktop</a>
        </div>
    </main>

    <script>
        const deepLink = {{ deep_link | tojson }};
        const androidIntent = {{ android_intent | tojson }};
        const manifestUrl = {{ manifest_url | tojson }};

        function openNuvio() {
            window.location.href = /android/i.test(navigator.userAgent) ? androidIntent : deepLink;
        }

        async function copyManifest() {
            if (!manifestUrl) return;
            try {
                await navigator.clipboard.writeText(manifestUrl);
                document.getElementById('status').textContent = 'Manifest URL copied.';
            } catch (_) {
                const range = document.createRange();
                range.selectNodeContents(document.getElementById('manifest'));
                const selection = window.getSelection();
                selection.removeAllRanges();
                selection.addRange(range);
                document.getElementById('status').textContent = 'Select and copy the manifest URL below.';
            }
        }

        window.addEventListener('load', () => {
            if (/windows/i.test(navigator.userAgent)) {
                document.getElementById('windows-update').hidden = false;
            }
            setTimeout(openNuvio, 100);
            setTimeout(() => {
                document.getElementById('actions').classList.add('visible');
                document.getElementById('status').textContent = 'If Nuvio did not open, use an option below.';
            }, 2500);
        });
    </script>
</body>
</html>
